<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="blueLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1e3a8a" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#1e3a8a" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#blue)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#dbeafe" opacity="0.3"/>
  <circle cx="1020" cy="80" r="120" fill="#bfdbfe" opacity="0.2"/>
  <circle cx="880" cy="200" r="80" fill="#93c5fd" opacity="0.1"/>

  <!-- Shield icon -->
  <g transform="translate(90, 100)" filter="url(#glow)">
    <rect x="0" y="0" width="130" height="130" rx="24" fill="url(#blue)"/>
    <!-- Shield path -->
    <g transform="translate(25, 18)">
      <path d="M40 0 L80 20 L80 52 C80 72 62 87 40 95 C18 87 0 72 0 52 L0 20 Z" fill="white" opacity="0.95"/>
      <path d="M40 8 L72 25 L72 50 C72 67 57 80 40 87 C23 80 8 67 8 50 L8 25 Z" fill="url(#blue)" opacity="0.15"/>
      <!-- Lock icon -->
      <rect x="28" y="42" width="24" height="20" rx="3" fill="white" opacity="0.9"/>
      <rect x="32" y="32" width="16" height="14" rx="8" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
      <circle cx="40" cy="52" r="3" fill="url(#blue)"/>
      <!-- Bolt -->
      <path d="M46 15 L34 38 L42 38 L36 58 L50 32 L42 32 Z" fill="#fbbf24" opacity="0.9"/>
    </g>
  </g>

  <!-- Title -->
  <text x="260" y="160" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="900" fill="#1e3a8a" letter-spacing="-2">CyberCEN</text>

  <!-- Subtitle -->
  <text x="260" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b" font-weight="500">by TTPSEC SPA</text>

  <!-- Divider -->
  <rect x="90" y="260" width="1020" height="1" fill="#e2e8f0"/>

  <!-- Main description -->
  <text x="90" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#0f172a" font-weight="700">Autoevaluación de Ciberseguridad</text>
  <text x="90" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#475569">Estándar del Coordinador Eléctrico Nacional | Sector Eléctrico de Chile</text>

  <!-- Feature cards row -->
  <g transform="translate(90, 390)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="240" height="90" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="240" height="90" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="36" cy="45" r="18" fill="#dbeafe"/>
    <text x="36" y="51" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#2563eb" text-anchor="middle" font-weight="700">12</text>
    <text x="66" y="38" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0f172a" font-weight="700">Dominios CIP</text>
    <text x="66" y="58" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b">NERC CIP-002 a CIP-014</text>

    <!-- Card 2 -->
    <rect x="260" y="0" width="240" height="90" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="260" y="0" width="240" height="90" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="296" cy="45" r="18" fill="#ecfdf5"/>
    <text x="296" y="52" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#059669" text-anchor="middle">&#9650;</text>
    <text x="326" y="38" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0f172a" font-weight="700">Análisis de Riesgo</text>
    <text x="326" y="58" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b">Nivel de madurez y brechas</text>

    <!-- Card 3 -->
    <rect x="520" y="0" width="240" height="90" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="520" y="0" width="240" height="90" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="556" cy="45" r="18" fill="#fffbeb"/>
    <text x="556" y="52" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#d97706" text-anchor="middle">&#9733;</text>
    <text x="586" y="38" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0f172a" font-weight="700">Plan de Acción</text>
    <text x="586" y="58" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b">Recomendaciones priorizadas</text>

    <!-- Card 4 -->
    <rect x="780" y="0" width="240" height="90" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="780" y="0" width="240" height="90" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="816" cy="45" r="18" fill="#fef2f2"/>
    <text x="816" y="52" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#dc2626" text-anchor="middle">&#8595;</text>
    <text x="846" y="38" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0f172a" font-weight="700">Reporte PDF</text>
    <text x="846" y="58" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#64748b">Exportación profesional</text>
  </g>

  <!-- Privacy badges -->
  <g transform="translate(90, 510)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="55" y="20" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#047857" text-anchor="middle" font-weight="700">ANÓNIMO</text>

    <rect x="120" y="0" width="100" height="30" rx="15" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
    <text x="170" y="20" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#1d4ed8" text-anchor="middle" font-weight="700">SEGURO</text>

    <rect x="230" y="0" width="130" height="30" rx="15" fill="#f3e8ff" stroke="#e9d5ff" stroke-width="1"/>
    <text x="295" y="20" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="700">SIN RASTREO</text>

    <rect x="370" y="0" width="120" height="30" rx="15" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="430" y="20" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#b45309" text-anchor="middle" font-weight="700">ACADEMICO</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="565" width="1200" height="65" fill="white" opacity="0.8"/>
  <rect x="0" y="565" width="1200" height="1" fill="#e2e8f0"/>

  <!-- TTPSEC branding bottom -->
  <text x="90" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#1e3a8a" font-weight="900" letter-spacing="-0.5">TTPSEC</text>
  <text x="180" y="600" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#94a3b8">|</text>
  <text x="195" y="600" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">Software para el bien común</text>

  <!-- MIT + URL right -->
  <text x="1110" y="593" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">MIT License</text>
  <text x="1110" y="612" font-family="Consolas, monospace" font-size="13" fill="#2563eb" text-anchor="end" font-weight="600">ttpsecspa.github.io/cybercen</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#blue)"/>
</svg>
