      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="tshield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="tbolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#tbg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#6366f1"/>
  <!-- Shield centered -->
  <g transform="translate(440, 80)">
    <path d="M160 0 L320 80 L320 200 C320 280 250 340 160 370 C70 340 0 280 0 200 L0 80 Z" fill="url(#tshield)" opacity="0.15"/>
    <path d="M160 30 L296 100 L296 192 C296 264 236 316 160 340 C84 316 24 264 24 192 L24 100 Z" fill="url(#tbg)" opacity="0.5"/>
  </g>
