  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#f8fafc" text-anchor="middle">CyberCEN</text>
  <text x="600" y="300" font-family="system-ui, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle">Autoevaluacion de Ciberseguridad</text>
  <rect x="560" y="320" width="80" height="3" rx="1.5" fill="#6366f1"/>
  <text x="600" y="365" font-family="system-ui, sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Estandar CEN | NERC CIP | Sector Electrico Chile</text>
  <!-- Badges -->
