    <text x="90" y="28" font-family="system-ui, sans-serif" font-size="15" fill="#6366f1" text-anchor="middle" font-weight="600">12 Dominios</text>
    <rect x="200" y="0" width="200" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="300" y="28" font-family="system-ui, sans-serif" font-size="15" fill="#22c55e" text-anchor="middle" font-weight="600">120 Controles</text>
    <rect x="420" y="0" width="200" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="520" y="28" font-family="system-ui, sans-serif" font-size="15" fill="#f59e0b" text-anchor="middle" font-weight="600">Analisis Riesgo</text>
    <rect x="640" y="0" width="180" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="730" y="28" font-family="system-ui, sans-serif" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="600">Reporte PDF</text>
